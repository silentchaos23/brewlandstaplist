<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tap List Menu</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        .tap-list {
            list-style-type: none;
            padding: 0;
        }
        .tap-list li {
            background: #fff;
            margin: 5px 0;
            padding: 15px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <h1>Tap List Menu</h1>
    <ul class="tap-list">
        <li>Tap 1: Pale Ale</li>
        <li>Tap 2: IPA</li>
        <li>Tap 3: Stout</li>
        <li>Tap 4: Lager</li>
        <li>Tap 5: Wheat Beer</li>
    </ul>
    <script>
        // JavaScript functionality can be added here
        console.log("Tap List Loaded");
    </script>
</body>
</html>
